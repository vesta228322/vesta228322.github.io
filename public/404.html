<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>KinoFlow</title>
    <script type="text/javascript">
      // Редирект для GitHub Pages SPA (History API)
      // Этот скрипт проверяет текущий URL (который вызвал 404)
      // и перенаправляет на index.html, передавая путь в query параметре
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
